{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>人员审核</h1>
  <form class="filters" method="get">
    <input name="keyword" placeholder="姓名或手机号" value="{{ request.args.get('keyword','') }}">
    <select name="status">
      <option value="">全部状态</option>
      {% for status in ["pending","approved","rejected"] %}<option value="{{ status }}" {% if request.args.get('status') == status %}selected{% endif %}>{{ status_label(status) }}</option>{% endfor %}
    </select>
    <button type="submit">筛选</button>
  </form>
  <div class="table-wrap">
    <table>
      <thead><tr><th>姓名</th><th>手机号</th><th>组织</th><th>状态</th><th>操作</th></tr></thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.name }}</td><td>{{ user.mobile }}</td>
          <td>{{ user.region }} / {{ user.project }} / {{ user.position }}</td>
          <td>{{ status_label(user.status) }}</td>
          <td>
            {% if user.role != "admin" %}
            <form method="post" action="{{ url_for('admin_set_user_status', user_id=user.id) }}" class="inline">
              <button name="status" value="approved">通过</button>
              <button name="status" value="rejected">驳回</button>
            </form>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
