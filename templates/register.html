{% extends "base.html" %}
{% block content %}
<section class="panel auth-panel">
  <h1>注册</h1>
  <form method="post" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>姓名<input name="name" required></label>
    <label>手机号<input name="mobile" required></label>
    <label>密码<input name="password" type="password" required></label>
    <label>区域/分公司<input name="region" required></label>
    <label>项目部<input name="project" required></label>
    <label>岗位<input name="position" required></label>
    <button class="primary" type="submit">提交注册</button>
  </form>
</section>
{% endblock %}
