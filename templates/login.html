{% extends "base.html" %}
{% block content %}
<section class="panel auth-panel">
  <h1>登录</h1>
  <form method="post" class="form">
    <label>手机号或管理员账号<input name="mobile" required></label>
    <label>密码<input name="password" type="password" required></label>
    <button class="primary" type="submit">登录</button>
  </form>
  <p class="muted">还没有账号？<a href="{{ url_for('register') }}">提交注册审核</a>。</p>
</section>
{% endblock %}
