{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>主观题阅卷</h1>
  {% for item in reviews %}
    <article class="review">
      <h2>{{ item.user_name }} - {{ item.paper_title }}</h2>
      <p><strong>题目：</strong>{{ item.stem }}</p>
      <p><strong>考生答案：</strong>{{ item.answer_text }}</p>
      <p><strong>参考答案：</strong>{{ item.reference_answer }}</p>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="answer_id" value="{{ item.answer_id }}">
        <label>最终得分<input name="final_score" type="number" step="0.5" min="0" max="{{ item.question_score }}" value="{{ item.suggested_score }}"></label>
        <label>评语<input name="comment"></label>
        <button class="primary" type="submit">保存阅卷</button>
      </form>
    </article>
  {% else %}
    <p class="muted">暂无待阅卷题目。</p>
  {% endfor %}
</section>
{% endblock %}
