{% extends "base.html" %}
{% block content %}
<section class="panel">
  <div class="exam-head">
    <h1>正式考试</h1>
    <div id="timer" data-deadline="{{ deadline }}">50:00</div>
  </div>
  <form id="exam-form" method="post" action="{{ url_for('submit_exam', attempt_id=attempt_id) }}">
    {% for q in questions %}
      <article class="question">
        <h2>{{ q.order_no }}. {{ q.stem }}</h2>
        {% if q.options %}
          {% for opt in q.options %}
            <label class="choice"><input type="{{ 'checkbox' if q.question_type == 'multiple_choice' else 'radio' }}" name="answer_{{ q.id }}" value="{{ opt.key }}"> {{ opt.key }}. {{ opt.text }}</label>
          {% endfor %}
        {% elif q.question_type == "true_false" %}
          <label class="choice"><input type="radio" name="answer_{{ q.id }}" value="√"> 正确</label>
          <label class="choice"><input type="radio" name="answer_{{ q.id }}" value="×"> 错误</label>
        {% else %}
          <textarea name="answer_{{ q.id }}" rows="5"></textarea>
        {% endif %}
      </article>
    {% endfor %}
    <button class="primary" type="submit">提交试卷</button>
  </form>
</section>
{% endblock %}
